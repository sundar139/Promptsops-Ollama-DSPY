name: Feature request
description: Suggest a practical improvement to the project
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem does this solve?
      placeholder: Describe current pain and who it affects.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Keep scope clear and implementation-practical.
      placeholder: Describe the smallest useful change.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or tradeoffs.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: This request fits the current local DSPy + Ollama project scope.
          required: true
